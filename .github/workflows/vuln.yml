name: vuln

on:
  push:
    branches: [main]
  schedule:
    # Daily at 12:17 UTC. Off-the-hour to dodge the cron stampede.
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"
  GOVULNCHECK_VERSION: "v1.1.4"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: govulncheck ./...
        run: govulncheck ./...
